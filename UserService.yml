server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/UserServiceDatabase
    username: root
    password: root
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
  sql:
    init:
      mode: always
  jackson:
    mapper:
      sort-properties-alphabetically: false
    date-format: dd-MM-yyyy HH:mm:ss

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
