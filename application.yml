spring:
  mvc:
    dispatch-options-request: true
    cors:
      mappings:
        "/**":
          allowed-origin-patterns:
            - http://localhost:4200
          allowed-methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          allowed-headers:
            - "*"
          allow-credentials: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
