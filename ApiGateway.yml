server:
  port: 9191

spring:
  cloud:
    gateway:
      routes[0]:
        id: USERSERVICE
        uri: lb://USERSERVICE
        predicates[0]:
          Path: api/users/**
      routes[1]:
        id: PRODUCTSERVICE
        uri: lb://PRODUCTSERVICE
        predicates[0]:
          Path: api/products/**
      routes[2]:
        id: ORDERSERVICE
        uri: lb://ORDERSERVICE
        predicates[0]:
          Path: api/orders/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
